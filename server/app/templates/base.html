<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or 'ChessBot Arena' }}</title>
  <link rel="stylesheet" href="/static/arena.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/arena">楚河 Bot 擂台 <span>V0.2</span></a>
    <nav>
      <a href="/arena">大厅</a>
      <a href="/settings">个人设置</a>
      <a href="/admin/bots">后台</a>
      <button class="theme-toggle" id="themeToggle" aria-label="切换暗色模式">🌓</button>
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <script>
  (function(){
    const KEY='chessArenaTheme';
    const saved=localStorage.getItem(KEY);
    if(saved==='dark') document.documentElement.setAttribute('data-theme','dark');
    function toggle(){
      const cur=document.documentElement.getAttribute('data-theme');
      const next=cur==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',next||'');
      localStorage.setItem(KEY,next);
    }
    document.getElementById('themeToggle').addEventListener('click',toggle);
  })();
  </script>
</body>
</html>
