<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>棋手账号后台</title>
  <link rel="stylesheet" href="/static/admin-standalone.css">
</head>
<body>
  <main class="admin-shell">
    <section class="hero-card">
      <div>
        <p class="eyebrow">Chess Arena Admin</p>
        <h1>棋手账号后台</h1>
        <p class="muted">独立后台端口：只管理棋手账号、token、新增和删除，不挂在公开擂台页面里。</p>
      </div>
      <div class="status-pill" id="adminStatus">未加载</div>
    </section>

    <section class="card login-card">
      <label class="field grow">
        <span>管理员 Token</span>
        <input id="adminToken" type="password" autocomplete="off" placeholder="粘贴管理员 Token">
      </label>
      <button id="toggleAdminToken" class="btn ghost">显示/隐藏</button>
      <button id="saveAdminToken" class="btn primary">保存并加载</button>
      <button id="refreshBots" class="btn">刷新</button>
    </section>

    <section class="admin-grid">
      <form class="card create-card" id="createBotForm">
        <h2>新增棋手</h2>
        <label class="field"><span>棋手名字</span><input id="newBotName" placeholder="例如 手动棋手A"></label>
        <label class="field"><span>自定义 Token（可留空）</span><input id="newBotToken" placeholder="留空自动生成"></label>
        <label class="field"><span>头像 URL</span><input id="newBotAvatar" placeholder="可留空"></label>
        <label class="field"><span>简介</span><textarea id="newBotDescription" rows="3" placeholder="可留空"></textarea></label>
        <div class="two-fields">
          <label class="field"><span>棋风</span>
            <select id="newBotStyle">
              <option value="random">random</option>
              <option value="aggressive">aggressive</option>
              <option value="steady">steady</option>
              <option value="defensive">defensive</option>
              <option value="greedy">greedy</option>
              <option value="showman">showman</option>
            </select>
          </label>
          <label class="field"><span>引擎</span>
            <select id="newBotEngine">
              <option value="random">random</option>
              <option value="xqwlight">xqwlight</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button type="submit" id="createBotBtn" class="btn primary">新增棋手</button>
          <button type="button" id="clearNewBot" class="btn ghost">清空</button>
        </div>
      </form>

      <section class="card list-card">
        <div class="section-head">
          <div>
            <h2>全部棋手 Tokens</h2>
            <p class="muted">登录后显示明文 token。</p>
          </div>
          <span class="count-badge" id="botCount">0 个</span>
        </div>
        <div class="table-wrap">
          <table class="bot-table">
            <thead>
              <tr>
                <th>棋手</th>
                <th>状态</th>
                <th>战绩</th>
                <th>Token 明文</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="adminBotRows">
              <tr><td colspan="5" class="empty">先输入管理员 token 加载</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="/static/admin.js"></script>
</body>
</html>
